<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin API Documentation</title>
    <style>
      :root {
        --bg: #0b0c10;
        --bg-alt: #1f2833;
        --fg: #c5c6c7;
        --accent: #66fcf1;
        --accent-soft: #45a29e;
        --danger: #ff4c4c;
        --border: #2b3545;
        --muted: #7b7f86;
        --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: var(--font-sans);
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      #sidebar {
        width: 260px;
        background: var(--bg-alt);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
      }

      #sidebar-header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--accent);
      }

      #module-search {
        margin: 8px 12px;
        padding: 6px 8px;
        width: calc(100% - 24px);
        border-radius: 4px;
        border: 1px solid var(--border);
        background: #11141b;
        color: var(--fg);
        font-size: 13px;
      }

      #module-list {
        flex: 1;
        overflow-y: auto;
        padding: 4px 0 8px 0;
      }

      .module-item {
        padding: 8px 14px;
        cursor: pointer;
        font-size: 13px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .module-item:hover {
        background: #151b24;
      }

      .module-item.active {
        background: #151b24;
        border-left: 3px solid var(--accent);
        padding-left: 11px;
      }

      .module-name {
        font-weight: 500;
      }
      .module-prefix {
        font-size: 11px;
        color: var(--muted);
      }
      .module-tags {
        font-size: 10px;
        color: var(--accent-soft);
      }

      #main {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      #main-header {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #title {
        font-size: 15px;
        font-weight: 600;
      }
      #meta {
        font-size: 11px;
        color: var(--muted);
      }

      #content {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      #routes-panel {
        flex: 1;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
      }

      #routes-header {
        padding: 8px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #route-search {
        padding: 4px 6px;
        font-size: 12px;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: #11141b;
        color: var(--fg);
        width: 220px;
      }

      #routes-list {
        flex: 1;
        overflow-y: auto;
        padding: 4px 0 8px 0;
      }

      .route-item {
        padding: 8px 14px;
        border-bottom: 1px solid #151b24;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 3px;
        font-size: 12px;
      }

      .route-item:hover {
        background: #11141b;
      }

      .route-item.active {
        background: #11141b;
        border-left: 3px solid var(--accent);
        padding-left: 11px;
      }

      .route-path {
        font-family: var(--font-mono);
        font-size: 12px;
      }

      .route-methods {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .method-pill {
        padding: 1px 6px;
        border-radius: 999px;
        font-size: 10px;
        font-family: var(--font-mono);
        text-transform: uppercase;
        border: 1px solid var(--border);
      }

      .method-GET {
        color: #4caf50;
        border-color: #4caf50;
      }
      .method-POST {
        color: #2196f3;
        border-color: #2196f3;
      }
      .method-PUT {
        color: #ff9800;
        border-color: #ff9800;
      }
      .method-DELETE {
        color: #f44336;
        border-color: #f44336;
      }
      .method-PATCH {
        color: #9c27b0;
        border-color: #9c27b0;
      }
      .method-OTHER {
        color: var(--muted);
        border-color: var(--muted);
      }

      .route-summary {
        color: var(--muted);
        font-size: 11px;
      }

      #details-panel {
        width: 420px;
        display: flex;
        flex-direction: column;
      }

      #details-header {
        padding: 8px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #details-body {
        flex: 1;
        padding: 10px 14px;
        overflow-y: auto;
        font-size: 12px;
      }

      .details-section-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-top: 8px;
        margin-bottom: 4px;
      }

      .details-code {
        font-family: var(--font-mono);
        background: #11141b;
        border-radius: 4px;
        padding: 6px 8px;
        border: 1px solid var(--border);
        white-space: pre-wrap;
        word-break: break-all;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        font-size: 11px;
        gap: 4px;
      }

      .pill-label {
        color: var(--muted);
        text-transform: uppercase;
        font-size: 9px;
        letter-spacing: 0.08em;
      }

      .pill-value {
        font-family: var(--font-mono);
      }

      #status-bar {
        padding: 4px 10px;
        border-top: 1px solid var(--border);
        font-size: 11px;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #050608;
      }
    </style>
  </head>

  <body>
    <div id="sidebar">
      <div id="sidebar-header">Admin API Docs</div>
      <input id="module-search" type="text" placeholder="Filter modules..." />
      <div id="module-list"></div>
    </div>

    <div id="main">
      <div id="main-header">
        <div>
          <div id="title">Loading admin documentation…</div>
          <div id="meta"></div>
        </div>
        <div style="font-size: 11px; color: var(--muted)">
          Source: <code>/admin/docs</code>
        </div>
      </div>

      <div id="content">
        <div id="routes-panel">
          <div id="routes-header">
            <span>Routes</span>
            <input
              id="route-search"
              type="text"
              placeholder="Filter routes..."
            />
          </div>
          <div id="routes-list"></div>
        </div>

        <div id="details-panel">
          <div id="details-header">Route details</div>
          <div id="details-body" style="color: var(--muted)">
            Select a module and a route to see details.
          </div>
        </div>
      </div>

      <div id="status-bar">
        <span id="status-text">Idle</span>
        <span id="counts-text"></span>
      </div>
    </div>

    <script>
      const DOCS_ENDPOINT = "/admin/docs";

      let docsData = null;
      let filteredModules = [];
      let activeModule = null;
      let activeRoute = null;

      const el = (id) => document.getElementById(id);

      function setStatus(text) {
        el("status-text").textContent = text;
      }

      function setCounts(modCount, routeCount) {
        el("counts-text").textContent =
          `Modules: ${modCount} | Routes: ${routeCount}`;
      }

      function methodClass(method) {
        switch (method.toUpperCase()) {
          case "GET":
            return "method-GET";
          case "POST":
            return "method-POST";
          case "PUT":
            return "method-PUT";
          case "DELETE":
            return "method-DELETE";
          case "PATCH":
            return "method-PATCH";
          default:
            return "method-OTHER";
        }
      }

      function renderModules() {
        const container = el("module-list");
        container.innerHTML = "";

        const search = el("module-search").value.trim().toLowerCase();

        filteredModules = docsData.modules.filter((m) => {
          if (!search) return true;
          const haystack = [m.module, m.prefix || "", (m.tags || []).join(" ")]
            .join(" ")
            .toLowerCase();
          return haystack.includes(search);
        });

        filteredModules.forEach((m) => {
          const div = document.createElement("div");
          div.className = "module-item" + (activeModule === m ? " active" : "");
          div.onclick = () => {
            activeModule = m;
            activeRoute = null;
            renderModules();
            renderRoutes();
            renderDetails();
          };

          const name = document.createElement("div");
          name.className = "module-name";
          name.textContent = m.module;

          const prefix = document.createElement("div");
          prefix.className = "module-prefix";
          prefix.textContent = m.prefix || "(no prefix)";

          const tags = document.createElement("div");
          tags.className = "module-tags";
          tags.textContent = m.tags && m.tags.length ? m.tags.join(", ") : "";

          div.appendChild(name);
          div.appendChild(prefix);
          if (tags.textContent) div.appendChild(tags);

          container.appendChild(div);
        });

        const totalRoutes = docsData.modules.reduce(
          (acc, m) => acc + m.routes.length,
          0,
        );
        setCounts(filteredModules.length, totalRoutes);
      }

      function renderRoutes() {
        const container = el("routes-list");
        container.innerHTML = "";

        if (!activeModule) {
          container.innerHTML =
            "<div style='padding: 8px 14px; color: var(--muted); font-size: 12px;'>Select a module to view its routes.</div>";
          return;
        }

        const search = el("route-search").value.trim().toLowerCase();

        const routes = activeModule.routes.filter((r) => {
          if (!search) return true;
          const haystack = [
            r.path || "",
            (r.methods || []).join(" "),
            r.name || "",
            r.summary || "",
          ]
            .join(" ")
            .toLowerCase();
          return haystack.includes(search);
        });

        routes.forEach((r) => {
          const div = document.createElement("div");
          div.className = "route-item" + (activeRoute === r ? " active" : "");
          div.onclick = () => {
            activeRoute = r;
            renderRoutes();
            renderDetails();
          };

          const path = document.createElement("div");
          path.className = "route-path";
          path.textContent = r.path;

          const methods = document.createElement("div");
          methods.className = "route-methods";
          (r.methods || []).forEach((m) => {
            const pill = document.createElement("span");
            pill.className = "method-pill " + methodClass(m);
            pill.textContent = m;
            methods.appendChild(pill);
          });

          const summary = document.createElement("div");
          summary.className = "route-summary";
          summary.textContent = r.summary || r.name || "";

          div.appendChild(path);
          div.appendChild(methods);
          if (summary.textContent) div.appendChild(summary);

          container.appendChild(div);
        });

        if (!routes.length) {
          container.innerHTML =
            "<div style='padding: 8px 14px; color: var(--muted); font-size: 12px;'>No routes match this filter.</div>";
        }
      }

      function renderDetails() {
        const body = el("details-body");
        body.innerHTML = "";

        if (!activeModule) {
          body.innerHTML =
            "<div style='color: var(--muted);'>Select a module and a route to see details.</div>";
          return;
        }

        if (!activeRoute) {
          body.innerHTML =
            "<div style='color: var(--muted);'>Select a route to see details.</div>";
          return;
        }

        const header = document.createElement("div");
        header.style.marginBottom = "8px";

        const path = document.createElement("div");
        path.className = "details-code";
        path.textContent = activeRoute.path;

        const pills = document.createElement("div");
        pills.style.display = "flex";
        pills.style.flexWrap = "wrap";
        pills.style.gap = "6px";
        pills.style.marginTop = "6px";

        const methodsPill = document.createElement("div");
        methodsPill.className = "pill";
        methodsPill.innerHTML = `<span class="pill-label">Methods</span><span class="pill-value">${(activeRoute.methods || []).join(", ")}</span>`;

        const namePill = document.createElement("div");
        namePill.className = "pill";
        namePill.innerHTML = `<span class="pill-label">Name</span><span class="pill-value">${activeRoute.name || "(none)"}</span>`;

        const endpointPill = document.createElement("div");
        endpointPill.className = "pill";
        endpointPill.innerHTML = `<span class="pill-label">Endpoint</span><span class="pill-value">${activeRoute.endpoint || "(unknown)"}</span>`;

        pills.appendChild(methodsPill);
        pills.appendChild(namePill);
        pills.appendChild(endpointPill);

        header.appendChild(path);
        header.appendChild(pills);

        body.appendChild(header);

        if (activeRoute.summary) {
          body.innerHTML += `
          <div class="details-section-title">Summary</div>
          <div>${activeRoute.summary}</div>
        `;
        }

        body.innerHTML += `
        <div class="details-section-title">Raw route data</div>
        <div class="details-code">${JSON.stringify(activeRoute, null, 2)}</div>
      `;
      }

      async function loadDocs() {
        try {
          setStatus("Fetching /admin/docs …");
          const res = await fetch(DOCS_ENDPOINT);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          docsData = await res.json();

          el("title").textContent = docsData.title || "Admin API Documentation";
          el("meta").textContent = docsData.description || "";

          renderModules();
          renderRoutes();
          renderDetails();
          setStatus("Loaded");
        } catch (err) {
          console.error(err);
          setStatus("Failed to load /admin/docs");
          el("title").textContent = "Failed to load admin docs";
          el("meta").textContent = err.toString();
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        el("module-search").addEventListener("input", () => {
          renderModules();
          renderRoutes();
          renderDetails();
        });

        el("route-search").addEventListener("input", () => {
          renderRoutes();
          renderDetails();
        });

        loadDocs();
      });
    </script>
  </body>
</html>
