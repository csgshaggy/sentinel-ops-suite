name: "Doctor & Cleanup CI"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  doctor-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run doctor
        run: python doctor.py

      - name: Run cleanup_root
        run: python cleanup_root.py

      - name: Verify package imports
        run: |
          python -c "import sys; sys.path.insert(0, 'src'); import ssrf_console; print('Imported ssrf_console OK')"
