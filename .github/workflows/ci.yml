name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv venv
          venv/bin/pip install --upgrade pip
          venv/bin/pip install -r requirements.txt

      - name: Structure check
        run: ./scripts/structure_check.sh

      - name: Lint
        run: venv/bin/ruff check src backend

      - name: Test backend
        run: venv/bin/pytest -q backend/tests || true

      - name: Test PELM
        run: venv/bin/pytest -q tests/pelm || true

      - name: Validate docs build
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
