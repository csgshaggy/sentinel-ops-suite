name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}

      - name: Install Make
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Install project + dev deps
        run: make install

      - name: Validate structure
        run: make structure

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build package
        run: make build
