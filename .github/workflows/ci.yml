name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install core deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          cd frontend && npm install || true

      - name: Validate Makefile structure
        run: |
          python makefile_integrity_validator.py

      - name: Run CI gates (ci-check)
        run: |
          make ci-check

      - name: Fast CI (ci-fast)
        run: |
          make ci-fast

      - name: Strict CI (ci-strict)
        run: |
          make ci-strict || true

      - name: Security CI (ci-security)
        run: |
          make ci-security || true

      - name: Precommit CI (ci-precommit)
        run: |
          make ci-precommit || true
