name: Super Doctor CI Gate

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  doctor:
    name: Doctor Validation
    runs-on: ubuntu-latest

    env:
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run doctor validators
        run: |
          make doctor


  integrity:
    name: Repo Integrity Validation
    runs-on: ubuntu-latest
    needs: doctor

    env:
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate repo structure
        run: |
          echo "[INFO] Running repo integrity checks..."
          bash .github/scripts/repo_integrity.sh


  drift:
    name: Drift Detection
    runs-on: ubuntu-latest
    needs: integrity

    env:
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run drift comparison
        run: |
          make drift

      - name: Upload drift results
        uses: actions/upload-artifact@v4
        with:
          name: drift-results
          path: runtime/drift_results.json
          if-no-files-found: ignore


  drift_dashboard:
    name: Drift Dashboard Generation
    runs-on: ubuntu-latest
    needs: drift

    env:
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate drift dashboard
        run: |
          make drift-dashboard

      - name: Upload drift dashboard
        uses: actions/upload-artifact@v4
        with:
          name: drift-dashboard
          path: runtime/drift_dashboard.md
          if-no-files-found: ignore

      - name: Upload dashboard to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: runtime


  cleanup:
    name: Cleanup Runtime
    runs-on: ubuntu-latest
    needs: drift_dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean runtime directory
        run: |
          make clean-runtime


  deploy:
    name: Deploy Drift Dashboard to Pages
    runs-on: ubuntu-latest
    needs: cleanup

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
