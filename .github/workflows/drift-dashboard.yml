name: Drift Dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  dashboard:
    name: Generate Drift Dashboard
    runs-on: ubuntu-latest

    env:
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (if any)
        run: |
          echo "No external dependencies required."

      - name: Generate drift dashboard
        run: |
          make drift-dashboard

      - name: Upload drift results (JSON)
        uses: actions/upload-artifact@v4
        with:
          name: drift-results
          path: runtime/drift_results.json

      - name: Upload drift dashboard (Markdown)
        uses: actions/upload-artifact@v4
        with:
          name: drift-dashboard
          path: runtime/drift_dashboard.md

      - name: Upload dashboard to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: runtime

  deploy:
    name: Deploy Drift Dashboard to Pages
    needs: dashboard
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
