name: Makefile Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  makefile-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make checkmake

      - name: Fast Makefile checks
        run: make test.fast

      - name: Full Makefile test suite
        run: make test.all
