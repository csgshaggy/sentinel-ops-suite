name: Super Doctor Balanced Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  doctor_balanced:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run Super Doctor
        run: |
          python tools/super_doctor.py

      - name: Parse Super Doctor JSON and previous score
        id: parse
        run: |
          import json
          from pathlib import Path

          report_path = Path("runtime/super_doctor_report.json")
          data = json.loads(report_path.read_text())

          fails = [e for e in data if e["severity"] == "FAIL"]

          score = None
          for e in data:
            if e["severity"] == "INFO" and "Project health score:" in e["message"]:
              try:
                part = e["message"].split("Project health score:")[1].strip()
                num = part.split("/")[0].strip()
                score = int(num)
              except Exception:
                score = None

          prev_score = None
          history_dir = Path("runtime/history")
          if history_dir.exists():
            snaps = sorted(history_dir.glob("super_doctor_*.json"))
            if len(snaps) >= 2:
              prev_path = snaps[-2]
              prev_data = json.loads(prev_path.read_text())
              for e in prev_data:
                if e["severity"] == "INFO" and "Project health score:" in e["message"]:
                  try:
                    part = e["message"].split("Project health score:")[1].strip()
                    num = part.split("/")[0].strip()
                    prev_score = int(num)
                  except Exception:
                    prev_score = None
                  break

          out = Path("$GITHUB_OUTPUT")
          out.write_text(
              f"fail_count={len(fails)}\n"
              f"score={score if score is not None else -1}\n"
              f"prev_score={prev_score if prev_score is not None else -1}\n",
              encoding="utf-8"
          )

      - name: Enforce Balanced Rules
        run: |
          FAIL_COUNT=${{ steps.parse.outputs.fail_count }}
          SCORE=${{ steps.parse.outputs.score }}
          PREV_SCORE=${{ steps.parse.outputs.prev_score }}

          echo "FAIL_COUNT=$FAIL_COUNT"
          echo "SCORE=$SCORE"
          echo "PREV_SCORE=$PREV_SCORE"

          # 1) Block on FAILs only
          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "❌ FAIL entries detected — blocking merge"
            exit 1
          fi

          # 2) Block if score < 70
          if [ "$SCORE" -ge 0 ] && [ "$SCORE" -lt 70 ]; then
            echo "❌ Health score below threshold (70) — blocking merge"
            exit 1
          fi

          # 3) Block if score dropped > 10 points
          if [ "$PREV_SCORE" -ge 0 ] && [ "$SCORE" -ge 0 ]; then
            DROP=$((PREV_SCORE - SCORE))
            if [ "$DROP" -gt 10 ]; then
              echo "❌ Health score regression > 10 points — blocking merge"
              exit 1
            fi
          fi

          # 4) Allow WARNs, dead files, unused functions, etc.
          echo "⚠️ WARNs and minor issues allowed in balanced mode"

          echo "✅ Super Doctor balanced checks passed"
