name: Makefile Integrity

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  makefile-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y make git

      - name: Validate Makefile modules
        run: |
          make validate.all

      - name: Run Makefile self-tests
        run: |
          make test.all

      - name: Install Makefile linter (checkmake)
        continue-on-error: true
        run: |
          sudo apt-get install -y checkmake || true

      - name: Run Makefile linter
        if: always()
        run: |
          if command -v checkmake >/dev/null 2>&1; then
            echo "Running checkmake..."
            checkmake -f Makefile || true
          else
            echo "checkmake not installed, skipping linter"
          fi
