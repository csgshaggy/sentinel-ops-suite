name: Publish Super Doctor Reports

on:
  schedule:
    - cron: "0 6 * * *"   # Runs daily at 06:00 UTC
  workflow_dispatch:       # Allows manual triggering

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run Super Doctor
        run: |
          python tools/super_doctor.py

      - name: Generate HTML Reports
        run: |
          python tools/generate_super_doctor_report.py

      - name: Commit updated reports
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/
          git add runtime/
          git commit -m "Daily Super Doctor report update" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push origin main
