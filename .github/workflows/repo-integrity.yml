name: Repo Integrity

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integrity:
    name: Validate Repository Structure
    runs-on: ubuntu-latest

    env:
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required directories
        run: |
          echo "[INFO] Checking required directories..."
          REQUIRED_DIRS=(
            "scripts"
            "scripts/ci"
            "runtime"
            "docs"
            ".github/workflows"
          )

          for d in "${REQUIRED_DIRS[@]}"; do
            if [ ! -d "$d" ]; then
              echo "[FAIL] Missing directory: $d"
              exit 1
            else
              echo "[OK] Found: $d"
            fi
          done

      - name: Validate required scripts
        run: |
          echo "[INFO] Checking required scripts..."
          REQUIRED_FILES=(
            "scripts/drift_detector.py"
            "scripts/ci/drift_dashboard.py"
            "scripts/doctor/run_doctor.py"
            "Makefile"
          )

          for f in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "[FAIL] Missing file: $f"
              exit 1
            else
              echo "[OK] Found: $f"
            fi
          done

      - name: Validate Makefile targets
        run: |
          echo "[INFO] Checking Makefile targets..."
          TARGETS=(
            "doctor"
            "baseline"
            "drift"
            "drift-dashboard"
            "ci-drift"
            "ci-doctor"
          )

          for t in "${TARGETS[@]}"; do
            if ! grep -qE "^$t:" Makefile; then
              echo "[FAIL] Missing Makefile target: $t"
              exit 1
            else
              echo "[OK] Target exists: $t"
            fi
          done

      - name: Validate runtime directory hygiene
        run: |
          echo "[INFO] Checking runtime directory..."
          mkdir -p runtime
          BAD_FILES=$(find runtime -maxdepth 1 -type f ! -name "*.json" ! -name "*.md" | wc -l)

          if [ "$BAD_FILES" -gt 0 ]; then
            echo "[FAIL] Unexpected files found in runtime/"
            find runtime -maxdepth 1 -type f ! -name "*.json" ! -name "*.md"
            exit 1
          else
            echo "[OK] Runtime directory clean."
          fi

      - name: Repo integrity passed
        run: echo "[OK] Repository structure validated successfully."
