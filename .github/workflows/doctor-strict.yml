name: Super Doctor Strict Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  doctor_strict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run Super Doctor
        run: |
          python tools/super_doctor.py

      - name: Parse Super Doctor JSON and previous score
        id: parse
        run: |
          import json
          from pathlib import Path

          report_path = Path("runtime/super_doctor_report.json")
          data = json.loads(report_path.read_text())

          fails = [e for e in data if e["severity"] == "FAIL"]
          warns = [e for e in data if e["severity"] == "WARN"]

          score = None
          for e in data:
            if e["severity"] == "INFO" and "Project health score:" in e["message"]:
              try:
                part = e["message"].split("Project health score:")[1].strip()
                num = part.split("/")[0].strip()
                score = int(num)
              except Exception:
                score = None

          prev_score = None
          history_dir = Path("runtime/history")
          if history_dir.exists():
            snaps = sorted(history_dir.glob("super_doctor_*.json"))
            if len(snaps) >= 2:
              prev_path = snaps[-2]
              prev_data = json.loads(prev_path.read_text())
              for e in prev_data:
                if e["severity"] == "INFO" and "Project health score:" in e["message"]:
                  try:
                    part = e["message"].split("Project health score:")[1].strip()
                    num = part.split("/")[0].strip()
                    prev_score = int(num)
                  except Exception:
                    prev_score = None
                  break

          out = Path("$GITHUB_OUTPUT")
          out.write_text(
              f"fail_count={len(fails)}\n"
              f"warn_count={len(warns)}\n"
              f"score={score if score is not None else -1}\n"
              f"prev_score={prev_score if prev_score is not None else -1}\n",
              encoding="utf-8"
          )

      - name: Enforce Strict Rules
        run: |
          FAIL_COUNT=${{ steps.parse.outputs.fail_count }}
          WARN_COUNT=${{ steps.parse.outputs.warn_count }}
          SCORE=${{ steps.parse.outputs.score }}
          PREV_SCORE=${{ steps.parse.outputs.prev_score }}

          echo "FAIL_COUNT=$FAIL_COUNT"
          echo "WARN_COUNT=$WARN_COUNT"
          echo "SCORE=$SCORE"
          echo "PREV_SCORE=$PREV_SCORE"

          # 1) Block on any FAIL
          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "❌ FAIL entries detected — blocking merge"
            exit 1
          fi

          # 2) Block on any WARN
          if [ "$WARN_COUNT" -gt 0 ]; then
            echo "❌ WARN entries detected — blocking merge"
            exit 1
          fi

          # 3) Block if score < 80
          if [ "$SCORE" -ge 0 ] && [ "$SCORE" -lt 80 ]; then
            echo "❌ Health score below threshold — blocking merge"
            exit 1
          fi

          # 4) Block if score dropped > 5 points
          if [ "$PREV_SCORE" -ge 0 ] && [ "$SCORE" -ge 0 ]; then
            DROP=$((PREV_SCORE - SCORE))
            if [ "$DROP" -gt 5 ]; then
              echo "❌ Health score regression > 5 points — blocking merge"
              exit 1
            fi
          fi

          # 5) Block on dead files
          if grep -q "Dead file (unreferenced)" runtime/super_doctor_report.json; then
            echo "❌ Dead files detected — blocking merge"
            exit 1
          fi

          # 6) Block on unused functions
          if grep -q "Unused function" runtime/super_doctor_report.json; then
            echo "❌ Unused functions detected — blocking merge"
            exit 1
          fi

          # 7) Block on circular imports
          if grep -qi "circular import" runtime/super_doctor_report.json; then
            echo "❌ Circular imports detected — blocking merge"
            exit 1
          fi

          # 8) Block on new FAILs
          if grep -q "New issue detected: \\[FAIL\\]" runtime/super_doctor_report.json; then
            echo "❌ New FAIL detected — blocking merge"
            exit 1
          fi

          # 9) Block on any severity regression
          if grep -q "New issue detected:" runtime/super_doctor_report.json; then
            echo "❌ Severity regression detected — blocking merge"
            exit 1
          fi

          # 10) Block if import graph too large
          EDGE_COUNT=$(grep -c "->" runtime/import_graph.dot || echo 0)
          if [ "$EDGE_COUNT" -gt 500 ]; then
            echo "❌ Import graph too large ($EDGE_COUNT edges) — blocking merge"
            exit 1
          fi

          # 11) Block if Python file count too high
          FILE_COUNT=$(find src -name "*.py" | wc -l)
          if [ "$FILE_COUNT" -gt 2000 ]; then
            echo "❌ Too many Python files ($FILE_COUNT) — blocking merge"
            exit 1
          fi

          # 12) Block if history folder too large
          if [ -d runtime/history ]; then
            HISTORY_SIZE=$(du -sm runtime/history | cut -f1)
          else
            HISTORY_SIZE=0
          fi
          if [ "$HISTORY_SIZE" -gt 200 ]; then
            echo "❌ History folder too large (${HISTORY_SIZE}MB) — blocking merge"
            exit 1
          fi

          echo "✅ Super Doctor strict checks passed"
