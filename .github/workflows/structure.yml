name: Structure & Drift Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (if any)
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run structure validator
        run: |
          echo "=== VALIDATE ==="
          make validate

      - name: Run drift-aware validator
        run: |
          echo "=== DRIFT CHECK ==="
          make drift-check
