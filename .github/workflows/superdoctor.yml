name: Super Doctor CI Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  superdoctor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Read Quality Mode
        id: mode
        run: |
          MODE=$(cat config/quality_mode.txt)
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "Active mode: $MODE"

      - name: Run Super Doctor
        run: |
          python tools/super_doctor.py

      - name: Parse Super Doctor JSON
        id: parse
        run: |
          import json
          from pathlib import Path

          data = json.loads(Path("runtime/super_doctor_report.json").read_text())

          fails = [e for e in data if e["severity"] == "FAIL"]
          warns = [e for e in data if e["severity"] == "WARN"]

          score = None
          for e in data:
            if e["severity"] == "INFO" and "Project health score:" in e["message"]:
              score = int(e["message"].split(":")[1].split("/")[0].strip())

          out = Path("$GITHUB_OUTPUT")
          out.write_text(
              f"fail_count={len(fails)}\n"
              f"warn_count={len(warns)}\n"
              f"score={score}\n",
              encoding="utf-8"
          )

      - name: Enforce Mode Rules
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          FAILS=${{ steps.parse.outputs.fail_count }}
          WARNS=${{ steps.parse.outputs.warn_count }}
          SCORE=${{ steps.parse.outputs.score }}

          echo "Mode: $MODE"
          echo "FAILS: $FAILS"
          echo "WARNS: $WARNS"
          echo "SCORE: $SCORE"

          if [ "$MODE" = "strict" ]; then
            echo "Running STRICT rules"
            if [ "$FAILS" -gt 0 ]; then exit 1; fi
            if [ "$WARNS" -gt 0 ]; then exit 1; fi
            if [ "$SCORE" -lt 80 ]; then exit 1; fi
          else
            echo "Running BALANCED rules"
            if [ "$FAILS" -gt 0 ]; then exit 1; fi
            if [ "$SCORE" -lt 70 ]; then exit 1; fi
          fi

          echo "Super Doctor checks passed"
