name: SuperDoctor CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  superdoctor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate project structure
        run: |
          make validate-structure

      - name: Run SuperDoctor (strict mode)
        run: |
          make superdoctor-strict

      - name: Upload SuperDoctor JSON report
        uses: actions/upload-artifact@v4
        with:
          name: superdoctor-report
          path: |
            reports/superdoctor.json
            reports/history.jsonl
          if-no-files-found: warn

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: superdoctor-logs
          path: logs/
          if-no-files-found: ignore
