name: SuperDoctor

on:
  push:
    branches: ["main"]

  workflow_dispatch: # Manual trigger

  schedule:
    - cron: "0 4 * * *" # Nightly at 04:00 UTC

jobs:
  superdoctor:
    name: SuperDoctor CI
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run SuperDoctor (strict mode)
        run: |
          echo "=== Running SuperDoctor ==="
          python tools/super_doctor.py

      - name: Upload SuperDoctor report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: superdoctor-report-${{ matrix.python-version }}
          path: reports/superdoctor_report.json
          if-no-files-found: warn

      - name: CI Gate — Structural Integrity Enforcement
        run: |
          echo "=== CI Gate: Structural Integrity Check ==="

          # Run dry-run to validate structure
          python tools/super_doctor.py --dry-run

          # If report exists, parse it
          if [ -f reports/superdoctor_report.json ]; then
            MISSING=$(jq '.checks.missing_inits | length' reports/superdoctor_report.json)
            if [ "$MISSING" -gt 0 ]; then
              echo "❌ Structural violations detected: missing __init__.py files."
              exit 1
            fi
          fi

          echo "✔ Structure validated. No violations detected."
