name: Doctor & Cleanup CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  doctor:
    name: Run Doctor Validators
    runs-on: ubuntu-latest

    env:
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run doctor validators
        run: |
          make doctor

      - name: Upload doctor results (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doctor-results
          path: runtime/doctor_results.json
          if-no-files-found: ignore

  cleanup:
    name: Cleanup Runtime Artifacts
    runs-on: ubuntu-latest
    needs: doctor

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean runtime directory
        run: |
          make clean-runtime
