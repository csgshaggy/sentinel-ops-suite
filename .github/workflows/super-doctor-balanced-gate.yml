name: Super Doctor Balanced Gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  doctor:
    name: Doctor Validation
    runs-on: ubuntu-latest

    env:
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run doctor validators
        run: |
          make doctor

  integrity:
    name: Repo Integrity Validation
    runs-on: ubuntu-latest
    needs: doctor

    env:
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate repo structure
        run: |
          echo "[INFO] Running repo integrity checks..."
          bash .github/scripts/repo_integrity.sh

  drift:
    name: Drift Check (No Dashboard)
    runs-on: ubuntu-latest
    needs: integrity

    env:
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run drift comparison
        run: |
          make drift

      - name: Upload drift results
        uses: actions/upload-artifact@v4
        with:
          name: drift-results
          path: runtime/drift_results.json
          if-no-files-found: ignore

  gate:
    name: Balanced Gate Decision
    runs-on: ubuntu-latest
    needs:
      - doctor
      - integrity
      - drift

    steps:
      - name: Gate passed
        run: echo "[OK] Super Doctor Balanced Gate passed."
