# -----------------------------------------------------------------------------
# GitHub Pages / Jekyll Configuration
# Clean, minimal, and isolated to prevent Liquid errors from code directories.
# -----------------------------------------------------------------------------

# Build ONLY the documentation directory
source: docs

# Basic site metadata
title: "SSRF Command Console Documentation"
description: "Documentation for the SSRF Command Console project"
theme: minima

# GitHub Pages–approved plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata
  - jekyll-relative-links
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-titles-from-headings

# Exclude everything outside docs to prevent Liquid parsing errors
exclude:
  - frontend
  - backend
  - src
  - tools
  - tests
  - node_modules
  - venv
  - runtime
  - static
  - mk
  - app
  - .ruff_cache
  - .git
  - package.json
  - package-lock.json
  - yarn.lock
  - pnpm-lock.yaml
  - Makefile
  - README.md
  - SECURITY.md
  - scripts
